version: "3.7"

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      # Preserve the settings database on the host filesystem
      - ./settings.db:/usr/src/app/settings.db:rw
    user: root
    environment:
      - DISCORD_BOT_TOKEN
      - DISCORD_BOT_APPLICATION_ID
      - DISCORD_BOT_GUILD_ID
      - DISCORD_GUILD_VOUCH_ROLE_ID
      - PAPERTRAIL_HOST
      - PAPERTRAIL_PORT
    command: "npm run host"
    restart: unless-stopped:0

  # Restarts the bot every 24 hours
  restarter:
    image: docker:cli
    volumes: ["/var/run/docker.sock:/var/run/docker.sock"]
    command: ["/bin/sh", "-c", "while true; do sleep 86400; docker restart discord-kirbot-bot-1; done"]
    restart: unless-stopped
